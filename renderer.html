<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; img-src data: https:; font-src 'self';" />
<title>Markdown Overlay</title>
<style>
  :root {
    --bg: rgba(22, 23, 28, 0.62);
    --bg-solid: rgba(28, 30, 36, 0.92);
    --stroke: rgba(255, 255, 255, 0.10);
    --text: #e7e9ee;
    --muted: #9aa0ab;
    --accent: #6ea8fe;
    --code-bg: rgba(255, 255, 255, 0.06);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100vh; overflow: hidden;
    font-family: -apple-system, "SF Pro Text", BlinkMacSystemFont, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .shell {
    display: flex; flex-direction: column; height: 100vh;
    background: var(--bg);
    border: 1px solid var(--stroke);
    border-radius: 14px;
    overflow: hidden;
    backdrop-filter: blur(2px);
    position: relative;
  }
  /* Title bar — drag handle (window is moved manually via JS) */
  .bar {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
    border-bottom: 1px solid var(--stroke);
    user-select: none;
    cursor: grab;
  }
  body.dragging .bar { cursor: grabbing; }
  body.dragging, body.dragging * { cursor: grabbing !important; }
  .title { font-size: 12.5px; font-weight: 600; letter-spacing: .2px;
           white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
           flex: 0 1 auto; max-width: 50%; cursor: grab; }
  /* Filler that widens the draggable grab area between title and buttons */
  .drag-spacer { flex: 1; align-self: stretch; min-width: 20px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
         box-shadow: 0 0 8px var(--accent); flex: none; }
  .actions { -webkit-app-region: no-drag; display: flex; gap: 6px; }
  button.icon {
    -webkit-app-region: no-drag;
    appearance: none; border: 1px solid var(--stroke);
    background: rgba(255,255,255,0.04); color: var(--text);
    width: 28px; height: 24px; border-radius: 7px; cursor: pointer;
    font-size: 12px; line-height: 1; display: grid; place-items: center;
    transition: background .12s ease, border-color .12s ease;
  }
  button.icon:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.22); }
  button.icon.active { background: rgba(110,168,254,0.22); border-color: var(--accent); color: #fff; }

  .content { flex: 1; overflow: hidden; position: relative; }
  /* Scrollable views */
  #view, #editor {
    position: absolute; inset: 0; overflow-y: auto; padding: 14px 18px;
  }
  #view::-webkit-scrollbar, #editor::-webkit-scrollbar { width: 9px; }
  #view::-webkit-scrollbar-thumb, #editor::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.16); border-radius: 8px; border: 2px solid transparent;
    background-clip: content-box;
  }
  #editor {
    display: none; margin: 0; border: 0; resize: none; width: 100%;
    background: var(--bg-solid); color: var(--text);
    font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 13px;
    line-height: 1.55; outline: none;
  }
  body.editing #view { display: none; }
  body.editing #editor { display: block; }

  /* Markdown styling */
  #view { font-size: 14px; line-height: 1.62; }
  #view h1, #view h2, #view h3 { line-height: 1.25; margin: 1.1em 0 .5em; font-weight: 650; }
  #view h1 { font-size: 1.5em; border-bottom: 1px solid var(--stroke); padding-bottom: .25em; }
  #view h2 { font-size: 1.25em; }
  #view h3 { font-size: 1.08em; }
  #view p { margin: .55em 0; }
  #view a { color: var(--accent); text-decoration: none; }
  #view a:hover { text-decoration: underline; }
  #view code { background: var(--code-bg); padding: .12em .4em; border-radius: 5px;
               font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: .88em; }
  #view pre { background: var(--code-bg); padding: 12px 14px; border-radius: 10px;
              overflow-x: auto; border: 1px solid var(--stroke); }
  #view pre code { background: none; padding: 0; }
  #view blockquote { margin: .6em 0; padding: .2em 0 .2em 14px; color: var(--muted);
                     border-left: 3px solid var(--accent); }
  #view ul, #view ol { padding-left: 1.4em; }
  #view li { margin: .25em 0; }
  #view table { border-collapse: collapse; width: 100%; margin: .6em 0; }
  #view th, #view td { border: 1px solid var(--stroke); padding: 6px 10px; }
  #view hr { border: 0; border-top: 1px solid var(--stroke); margin: 1.2em 0; }
  #view img { max-width: 100%; border-radius: 8px; }
  .empty { color: var(--muted); font-size: 13px; padding: 8px 2px; }

  /* Status toast */
  #toast {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.66); color: #fff; font-size: 11.5px;
    padding: 5px 11px; border-radius: 999px; opacity: 0; pointer-events: none;
    transition: opacity .25s ease; border: 1px solid var(--stroke);
  }
  #toast.show { opacity: 1; }
  .saved { color: var(--muted); font-size: 11px; margin-left: 4px; }
  .sep { width: 1px; height: 16px; background: var(--stroke); margin: 0 3px; }
  /* Rename input (shown on title double-click) */
  .title-edit {
    -webkit-app-region: no-drag; display: none; flex: 1;
    font-size: 12.5px; font-weight: 600; color: var(--text);
    background: var(--bg-solid); border: 1px solid var(--accent);
    border-radius: 6px; padding: 3px 6px; outline: none;
  }
  body.renaming .title { display: none; }
  body.renaming .title-edit { display: block; }
  /* Plain-text (.txt) view */
  #view pre.plain {
    margin: 0; white-space: pre-wrap; word-break: break-word;
    font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 13px;
    line-height: 1.55; background: none; border: 0; padding: 0;
  }
  /* Window controls (left of title) */
  button.icon.win { width: 22px; height: 20px; font-size: 13px; border-radius: 6px; }
  button.icon.win.close { font-size: 16px; }
  button.icon.win.close:hover { background: rgba(237,76,68,0.9); border-color: rgba(237,76,68,0.95); color: #fff; }
  /* Collapsed (minimized → roll up to the bar) */
  body.collapsed .content, body.collapsed #toast, body.collapsed .menu { display: none; }

  /* ⋯ overflow menu */
  .menu {
    -webkit-app-region: no-drag;
    position: absolute; top: 40px; right: 8px; z-index: 50;
    display: none; flex-direction: column; min-width: 188px; padding: 6px;
    background: var(--bg-solid); border: 1px solid var(--stroke);
    border-radius: 12px; box-shadow: 0 12px 34px rgba(0,0,0,0.34);
    backdrop-filter: blur(18px);
  }
  body.menu-open .menu { display: flex; }
  .menu-row, .menu-item {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 7px 9px; border-radius: 8px; font-size: 12.5px; color: var(--text);
  }
  .menu-item {
    appearance: none; background: none; border: 0; cursor: pointer; text-align: left;
    font: inherit; font-size: 12.5px;
  }
  .menu-item:hover { background: rgba(127,127,127,0.16); }
  .menu .grow { flex: 1; }
  .menu-key { color: var(--muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: .4px; }
  .menu-val { color: var(--muted); font-variant-numeric: tabular-nums; }
  .mi-ic { width: 18px; text-align: center; }
  .menu-sep { height: 1px; background: var(--stroke); margin: 5px 4px; }
  button.mini {
    appearance: none; border: 1px solid var(--stroke); background: rgba(127,127,127,0.10);
    color: var(--text); width: 24px; height: 22px; border-radius: 6px; cursor: pointer;
    font-size: 14px; line-height: 1; display: grid; place-items: center;
  }
  button.mini:hover { background: rgba(127,127,127,0.22); }
  /* Light theme */
  body.light {
    --bg: rgba(248, 249, 251, 0.66);
    --bg-solid: rgba(255, 255, 255, 0.96);
    --stroke: rgba(0, 0, 0, 0.12);
    --text: #1c1e24;
    --muted: #6b7280;
    --accent: #2563eb;
    --code-bg: rgba(0, 0, 0, 0.05);
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="bar">
      <button class="icon win close" id="btn-close" title="Close overlay (⌘W)">×</button>
      <button class="icon win" id="btn-min" title="Minimize (roll up)">–</button>
      <button class="icon win" id="btn-max" title="Maximize / restore">▢</button>
      <span class="title" id="title" title="Double-click to rename">Markdown Overlay</span>
      <input class="title-edit" id="title-edit" spellcheck="false" />
      <span class="saved" id="saved"></span>
      <span class="drag-spacer"></span>
      <div class="actions">
        <button class="icon" id="btn-lock" title="Click-through lock">🔒</button>
        <button class="icon" id="btn-edit" title="Toggle edit (autosaves)">✎</button>
        <button class="icon" id="btn-more" title="More options">⋯</button>
      </div>
    </div>
    <div class="menu" id="menu" role="menu">
      <div class="menu-row">
        <span class="menu-key">Opacity</span><span class="grow"></span>
        <button class="mini" id="m-op-down" title="Less opaque (⌥⌘-)">−</button>
        <span class="menu-val" id="m-op-val">95%</span>
        <button class="mini" id="m-op-up" title="More opaque (⌥⌘=)">+</button>
      </div>
      <button class="menu-item" id="m-theme"><span>Theme</span><span class="grow"></span><span class="menu-val" id="m-theme-val">Dark</span></button>
      <div class="menu-sep"></div>
      <button class="menu-item" id="m-new"><span class="mi-ic">＋</span>New note</button>
      <button class="menu-item" id="m-open"><span class="mi-ic">📂</span>Open file…</button>
      <button class="menu-item" id="m-overlay"><span class="mi-ic">⧉</span>New overlay</button>
      <button class="menu-item" id="m-dir"><span class="mi-ic">🗂</span>Notes folder</button>
    </div>
    <div class="content">
      <div id="view"><div class="empty">Press <b>✎</b> and start typing — a note is saved automatically to <b>~/Documents/Overlay Notes</b>. Or use <b>⋯ → Open file…</b></div></div>
      <textarea id="editor" spellcheck="false" placeholder="# Start typing markdown…"></textarea>
    </div>
    <div id="toast"></div>
  </div>

<script src="renderer.js"></script>
</body>
</html>
